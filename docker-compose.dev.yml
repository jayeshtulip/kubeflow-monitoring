# Local development stack (no GPU required)
version: '3.8'
services:
  api:
    build: docker/api
    ports: ['8000:8000']
    env_file: .env
  qdrant:
    image: qdrant/qdrant:v1.8.0
    ports: ['6333:6333']
    volumes: ['qdrant_data:/qdrant/storage']
  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
  postgres:
    image: postgres:15-alpine
    ports: ['5432:5432']
    environment:
      POSTGRES_DB: llm_platform
      POSTGRES_USER: llm_admin
      POSTGRES_PASSWORD: localdev
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.0
    ports: ['5000:5000']
    command: mlflow server --host 0.0.0.0 --backend-store-uri postgresql://llm_admin:localdev@postgres/llm_platform
volumes:
  qdrant_data:
