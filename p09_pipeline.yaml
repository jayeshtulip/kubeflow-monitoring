          \ Exception as e:\n        print(f'Warning: could not init Ollama LLM: {e}')\n\
          \        import os\n        os.environ[\"OPENAI_API_KEY\"] = \"dummy-key-not-used\"\
          \n    result = evaluate(ds, metrics=[\n        faithfulness, answer_relevancy,\n\
          \        context_precision, context_recall, answer_correctness,\n    ])\n\
          \    elapsed = round(time.perf_counter() - t0, 2)\n\n    df = result.to_pandas()\n\
          \    scores = {\n        \"faithfulness\":       float(df[\"faithfulness\"\
          ].mean()),\n        \"answer_relevancy\":   float(df[\"answer_relevancy\"\
          ].mean()),\n        \"context_precision\":  float(df[\"context_precision\"\
          ].mean()),\n        \"context_recall\":     float(df[\"context_recall\"\
          ].mean()),\n        \"answer_correctness\": float(df[\"answer_correctness\"\
