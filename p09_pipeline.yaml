          \ int,\n    domain_filter: str,               # \"tech\" | \"hr\" | \"org\"\
          \ | \"\" (all)\n    postgres_host: str,\n    postgres_db: str,\n    postgres_user:\
          \ str,\n    postgres_password: str,\n    qa_limit: int,\n    # Outputs\n\
          \    retrieval_dataset: Output[Dataset],\n) -> int:\n    \"\"\"\n    Load\
          \ golden QA pairs from PostgreSQL, retrieve top-k contexts from Qdrant\n\
          \    for each question, and write (question, contexts, ground_truth, domain)\n\
          \    rows to a JSON-lines dataset artifact.\n\n    Returns the number of\
          \ questions processed.\n    \"\"\"\n    import json\n    import os\n   \
          \ import psycopg2\n    import psycopg2.extras\n    from qdrant_client import\
          \ QdrantClient\n    from sentence_transformers import SentenceTransformer\n\
          \n    # \u2500\u2500 Load QA pairs \u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\n    conn = psycopg2.connect(\n        host=postgres_host,\
          \ dbname=postgres_db,\n        user=postgres_user, password=postgres_password,\n\
          \    )\n    with conn.cursor(cursor_factory=psycopg2.extras.DictCursor)\
          \ as cur:\n        where = \"active = TRUE\"\n        params = []\n    \
          \    if domain_filter:\n            where += \" AND domain = %s\"\n    \
          \        params.append(domain_filter)\n        params.append(qa_limit)\n\
          \        cur.execute(\n            f\"SELECT question, ground_truth, domain\
          \ FROM golden_qa WHERE {where} LIMIT %s\",\n            params,\n      \
          \  )\n        pairs = cur.fetchall()\n    conn.close()\n\n    if not pairs:\n\
          \        raise ValueError(\"No QA pairs found in golden_qa table\")\n\n\
          \    # \u2500\u2500 Embed questions \u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\n    model = SentenceTransformer(embedding_model)\n    questions\
          \ = [r[\"question\"] for r in pairs]\n    vectors = model.encode(questions,\
          \ normalize_embeddings=True, convert_to_numpy=True)\n\n    # \u2500\u2500\
          \ Retrieve from Qdrant \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
