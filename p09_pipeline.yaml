          \ float,\n    ragas_metrics_output: Output[Metrics],\n    ragas_report:\
          \ Output[Artifact],\n    ollama_base_url: str = 'http://ollama-service.llm-platform-prod.svc.cluster.local:11434',\n\
          \    ollama_model: str = 'mistral:7b',\n) -> bool:\n    \"\"\"\n    Compute\
          \ all 6 RAGAS metrics and check the deployment gate.\n\n    Returns True\
          \ (gate PASSED \u2014 allow deployment to staging) or\n            False\
          \ (gate FAILED \u2014 block deployment, trigger P11 retraining).\n    \"\
          \"\"\n    import json\n    import time\n    import os\n    os.environ[\"\
          OPENAI_API_KEY\"] = \"dummy-not-used\"\n    import mlflow\n    from datasets\
          \ import Dataset\n    from ragas import evaluate\n    from ragas.llms import\
