# PIPELINE DEFINITION
# Name: p09-ragas-evaluation
# Description: RAGAS evaluation: retrieve -> generate -> score -> gate -> promote/block
# Inputs:
#    collection_names: str [Default: '["tech_docs","hr_policies","org_info"]']
#    domain_filter: str [Default: '']
#    embedding_model: str [Default: 'all-MiniLM-L6-v2']
#    faithfulness_hard_block: float [Default: 0.85]
#    hallucination_hard_block: float [Default: 0.15]
#    kubeflow_p11_webhook_url: str [Default: '']
#    max_tokens: int [Default: 512.0]
#    min_pairs_per_domain: int [Default: 20.0]
#    mlflow_experiment: str [Default: 'ragas-evaluation']
#    mlflow_tracking_uri: str [Default: 'http://172.20.232.117:80']
#    model_name: str [Default: 'llm-platform-rag-config']
#    model_version: str [Default: 'latest']
#    ollama_base_url: str [Default: 'http://ollama-service.llm-platform-prod.svc.cluster.local:11434']
#    ollama_model: str [Default: 'mistral:7b']
#    postgres_db: str [Default: 'llm_platform']
#    postgres_host: str [Default: 'llm-platform-prod-postgres.c2xig0uywkrb.us-east-1.rds.amazonaws.com']
#    postgres_password: str [Default: 'Llmplatform2026']
#    postgres_user: str [Default: 'llm_admin']
#    qa_limit: int [Default: 200.0]
#    qdrant_host: str [Default: 'qdrant-service.llm-platform-prod.svc.cluster.local']
#    qdrant_port: int [Default: 6333.0]
#    run_name: str [Default: 'ragas-weekly']
#    slack_webhook_url: str [Default: '']
#    top_k: int [Default: 5.0]
# Outputs:
#    ragas-score-component-ragas_metrics_output: system.Metrics
components:
  comp-block-deployment-component:
    executorLabel: exec-block-deployment-component
    inputDefinitions:
      artifacts:
        ragas_report:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        kubeflow_webhook_url:
          parameterType: STRING
        model_name:
          parameterType: STRING
        version:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        block_artifact:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
  comp-condition-1:
    dag:
      tasks:
        notify-slack-component:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-notify-slack-component
          dependentTasks:
          - promote-to-staging-component
          inputs:
            artifacts:
              promotion_result:
                taskOutputArtifact:
                  outputArtifactKey: promotion_result
                  producerTask: promote-to-staging-component
              ragas_report:
                componentInputArtifact: pipelinechannel--ragas-score-component-ragas_report
            parameters:
              model_name:
                componentInputParameter: pipelinechannel--model_name
              slack_webhook_url:
                componentInputParameter: pipelinechannel--slack_webhook_url
              version:
                componentInputParameter: pipelinechannel--model_version
          taskInfo:
            name: notify-slack-component
        promote-to-staging-component:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-promote-to-staging-component
          inputs:
            artifacts:
              ragas_report:
                componentInputArtifact: pipelinechannel--ragas-score-component-ragas_report
            parameters:
              mlflow_tracking_uri:
                componentInputParameter: pipelinechannel--mlflow_tracking_uri
              model_name:
                componentInputParameter: pipelinechannel--model_name
              ragas_gate_passed:
                runtimeValue:
                  constant: true
              version:
                componentInputParameter: pipelinechannel--model_version
          taskInfo:
            name: promote-to-staging-component
    inputDefinitions:
      artifacts:
        pipelinechannel--ragas-score-component-ragas_report:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        pipelinechannel--mlflow_tracking_uri:
          parameterType: STRING
        pipelinechannel--model_name:
          parameterType: STRING
        pipelinechannel--model_version:
          parameterType: STRING
        pipelinechannel--ragas-score-component-Output:
          parameterType: BOOLEAN
        pipelinechannel--slack_webhook_url:
          parameterType: STRING
  comp-condition-2:
    dag:
      tasks:
        block-deployment-component:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-block-deployment-component
          inputs:
            artifacts:
              ragas_report:
                componentInputArtifact: pipelinechannel--ragas-score-component-ragas_report
            parameters:
              kubeflow_webhook_url:
                componentInputParameter: pipelinechannel--kubeflow_p11_webhook_url
              model_name:
                componentInputParameter: pipelinechannel--model_name
              version:
                componentInputParameter: pipelinechannel--model_version
          taskInfo:
            name: block-deployment-component
        notify-slack-component-2:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-notify-slack-component-2
          dependentTasks:
          - block-deployment-component
          inputs:
            artifacts:
              promotion_result:
                taskOutputArtifact:
                  outputArtifactKey: block_artifact
                  producerTask: block-deployment-component
              ragas_report:
                componentInputArtifact: pipelinechannel--ragas-score-component-ragas_report
            parameters:
              model_name:
                componentInputParameter: pipelinechannel--model_name
              slack_webhook_url:
                componentInputParameter: pipelinechannel--slack_webhook_url
              version:
                componentInputParameter: pipelinechannel--model_version
          taskInfo:
            name: notify-slack-component-2
    inputDefinitions:
      artifacts:
        pipelinechannel--ragas-score-component-ragas_report:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        pipelinechannel--kubeflow_p11_webhook_url:
          parameterType: STRING
        pipelinechannel--model_name:
          parameterType: STRING
        pipelinechannel--model_version:
          parameterType: STRING
        pipelinechannel--ragas-score-component-Output:
          parameterType: BOOLEAN
        pipelinechannel--slack_webhook_url:
          parameterType: STRING
  comp-generate-answers-component:
    executorLabel: exec-generate-answers-component
    inputDefinitions:
      artifacts:
        retrieval_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        max_tokens:
          parameterType: NUMBER_INTEGER
        model_name:
          parameterType: STRING
        ollama_base_url:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        answered_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: NUMBER_INTEGER
  comp-notify-slack-component:
    executorLabel: exec-notify-slack-component
    inputDefinitions:
      artifacts:
        promotion_result:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        ragas_report:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        model_name:
          parameterType: STRING
        slack_webhook_url:
          parameterType: STRING
        version:
          parameterType: STRING
  comp-notify-slack-component-2:
    executorLabel: exec-notify-slack-component-2
    inputDefinitions:
      artifacts:
        promotion_result:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        ragas_report:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        model_name:
          parameterType: STRING
        slack_webhook_url:
          parameterType: STRING
        version:
          parameterType: STRING
  comp-promote-to-staging-component:
    executorLabel: exec-promote-to-staging-component
    inputDefinitions:
      artifacts:
        ragas_report:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        mlflow_tracking_uri:
          parameterType: STRING
        model_name:
          parameterType: STRING
        ragas_gate_passed:
          parameterType: BOOLEAN
        version:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        promotion_result:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: BOOLEAN
  comp-ragas-score-component:
    executorLabel: exec-ragas-score-component
    inputDefinitions:
      artifacts:
        answered_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        faithfulness_hard_block:
          parameterType: NUMBER_DOUBLE
        hallucination_hard_block:
          parameterType: NUMBER_DOUBLE
        mlflow_experiment:
          parameterType: STRING
        mlflow_tracking_uri:
          parameterType: STRING
        ollama_base_url:
          defaultValue: http://ollama-service.llm-platform-prod.svc.cluster.local:11434
          isOptional: true
          parameterType: STRING
        ollama_model:
          defaultValue: mistral:7b
          isOptional: true
          parameterType: STRING
        run_name:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        ragas_metrics_output:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
        ragas_report:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: BOOLEAN
  comp-retrieve-contexts-component:
    executorLabel: exec-retrieve-contexts-component
    inputDefinitions:
      parameters:
        collection_names:
          parameterType: STRING
        domain_filter:
          parameterType: STRING
        embedding_model:
          parameterType: STRING
        postgres_db:
          parameterType: STRING
        postgres_host:
          parameterType: STRING
        postgres_password:
          parameterType: STRING
        postgres_user:
          parameterType: STRING
        qa_limit:
          parameterType: NUMBER_INTEGER
        qdrant_host:
          parameterType: STRING
        qdrant_port:
          parameterType: NUMBER_INTEGER
        top_k:
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      artifacts:
        retrieval_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: NUMBER_INTEGER
deploymentSpec:
  executors:
    exec-block-deployment-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - block_deployment_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.2.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'requests==2.32.0'\
          \ && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef block_deployment_component(\n    model_name: str,\n    version:\
          \ str,\n    ragas_report: Input[Artifact],\n    kubeflow_webhook_url: str,\n\
          \    block_artifact: Output[Artifact],\n) -> None:\n    import json, requests\n\
          \    with open(ragas_report.path) as f:\n        ragas_data = json.load(f)\n\
          \    record = {\"blocked\": True, \"model_name\": model_name, \"version\"\
          : version,\n              \"gate_failures\": ragas_data.get(\"gate_failures\"\
          , [])}\n    with open(block_artifact.path, \"w\") as f:\n        json.dump(record,\
          \ f, indent=2)\n    print(\"BLOCKED:\", model_name, version)\n    if kubeflow_webhook_url\
          \ and kubeflow_webhook_url.startswith(\"http\"):\n        try:\n       \
          \     requests.post(kubeflow_webhook_url, json=record, timeout=15)\n   \
          \     except Exception as e:\n            print(\"Webhook error:\", e)\n\
          \n"
        image: 659071697671.dkr.ecr.us-east-1.amazonaws.com/llm-platform/pipeline-base:latest
    exec-generate-answers-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - generate_answers_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.2.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'requests==2.32.0'\
          \ 'httpx==0.27.0' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef generate_answers_component(\n    retrieval_dataset: Input[Dataset],\n\
          \    ollama_base_url: str,\n    model_name: str,\n    max_tokens: int,\n\
          \    # Outputs\n    answered_dataset: Output[Dataset],\n) -> int:\n    \"\
          \"\"\n    For each row in retrieval_dataset, call Ollama to generate an\
          \ answer\n    using the retrieved contexts as the RAG context window.\n\n\
          \    Returns the number of answers generated.\n    \"\"\"\n    import json\n\
          \    import httpx\n\n    SYSTEM_PROMPT = (\n        \"You are an expert\
          \ infrastructure engineer. \"\n        \"Answer the question based ONLY\
          \ on the provided context. \"\n        \"If the context does not contain\
          \ enough information, say so explicitly. \"\n        \"Be concise and factual.\"\
          \n    )\n\n    def generate(question: str, contexts: list[str]) -> str:\n\
          \        context_str = \"\\n\\n\".join(f\"[Context {i+1}]\\n{c}\" for i,\
          \ c in enumerate(contexts))\n        prompt = f\"{context_str}\\n\\nQuestion:\
          \ {question}\\nAnswer:\"\n\n        payload = {\n            \"model\":\
          \  model_name,\n            \"prompt\": prompt,\n            \"system\"\
          : SYSTEM_PROMPT,\n            \"stream\": False,\n            \"options\"\
          : {\"num_predict\": max_tokens, \"temperature\": 0.0},\n        }\n    \
          \    try:\n            resp = httpx.post(\n                f\"{ollama_base_url}/api/generate\"\
          ,\n                json=payload,\n                timeout=60.0,\n      \
          \      )\n            resp.raise_for_status()\n            return resp.json().get(\"\
          response\", \"\").strip()\n        except Exception as e:\n            return\
          \ f\"[generation_error: {e}]\"\n\n    rows = []\n    with open(retrieval_dataset.path)\
          \ as f:\n        for line in f:\n            row = json.loads(line)\n  \
          \          row[\"answer\"] = generate(row[\"question\"], row[\"contexts\"\
          ])\n            rows.append(row)\n\n    with open(answered_dataset.path,\
          \ \"w\") as f:\n        for row in rows:\n            f.write(json.dumps(row)\
          \ + \"\\n\")\n\n    return len(rows)\n\n"
        image: 659071697671.dkr.ecr.us-east-1.amazonaws.com/llm-platform/pipeline-base:latest
    exec-notify-slack-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - notify_slack_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.2.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'mlflow==2.12.0'\
          \ 'boto3==1.34.0' 'requests==2.32.0' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef notify_slack_component(\n    slack_webhook_url: str,\n    model_name:\
          \ str,\n    version: str,\n    promotion_result: Input[Artifact],\n    ragas_report:\
          \ Input[Artifact],\n) -> None:\n    \"\"\"\n    Post a Slack message summarising\
          \ the RAGAS result and promotion decision.\n    Used at the end of P09 regardless\
          \ of pass/fail.\n    \"\"\"\n    import json\n    import requests\n\n  \
          \  with open(promotion_result.path) as f:\n        promo = json.load(f)\n\
          \    with open(ragas_report.path) as f:\n        ragas = json.load(f)\n\n\
          \    promoted = promo.get(\"promoted\", False)\n    icon = \":white_check_mark:\"\
          \ if promoted else \":x:\"\n    status = \"Promoted to *Staging*\" if promoted\
          \ else f\"*Blocked* \u2014 {promo.get('reason', 'unknown')}\"\n\n    text\
          \ = (\n        f\"{icon} *P09 RAGAS Evaluation* \u2014 {model_name} v{version}\\\
          n\"\n        f\"Status: {status}\\n\"\n        f\"Faithfulness: `{ragas.get('faithfulness',\
          \ 'n/a'):.3f}` (target \u2265 0.90)\\n\"\n        f\"Hallucination: `{ragas.get('hallucination_rate',\
          \ 'n/a'):.3f}` (target \u2264 0.10)\\n\"\n        f\"Answer Relevancy: `{ragas.get('answer_relevancy',\
          \ 'n/a'):.3f}`\\n\"\n        f\"Samples: {ragas.get('sample_count', 'n/a')}\
          \ | \"\n        f\"Eval time: {ragas.get('eval_seconds', 'n/a')}s\\n\"\n\
          \        f\"MLflow run: `{ragas.get('mlflow_run_id', 'n/a')}`\"\n    )\n\
          \n    if slack_webhook_url and slack_webhook_url.startswith(\"https://\"\
          ):\n        try:\n            requests.post(slack_webhook_url, json={\"\
          text\": text}, timeout=10)\n        except Exception as e:\n           \
          \ print(f\"Slack notification failed: {e}\")\n\n    print(text)\n\n"
        image: python:3.11-slim
    exec-notify-slack-component-2:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - notify_slack_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.2.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'mlflow==2.12.0'\
          \ 'boto3==1.34.0' 'requests==2.32.0' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef notify_slack_component(\n    slack_webhook_url: str,\n    model_name:\
          \ str,\n    version: str,\n    promotion_result: Input[Artifact],\n    ragas_report:\
          \ Input[Artifact],\n) -> None:\n    \"\"\"\n    Post a Slack message summarising\
          \ the RAGAS result and promotion decision.\n    Used at the end of P09 regardless\
          \ of pass/fail.\n    \"\"\"\n    import json\n    import requests\n\n  \
          \  with open(promotion_result.path) as f:\n        promo = json.load(f)\n\
          \    with open(ragas_report.path) as f:\n        ragas = json.load(f)\n\n\
          \    promoted = promo.get(\"promoted\", False)\n    icon = \":white_check_mark:\"\
          \ if promoted else \":x:\"\n    status = \"Promoted to *Staging*\" if promoted\
          \ else f\"*Blocked* \u2014 {promo.get('reason', 'unknown')}\"\n\n    text\
          \ = (\n        f\"{icon} *P09 RAGAS Evaluation* \u2014 {model_name} v{version}\\\
          n\"\n        f\"Status: {status}\\n\"\n        f\"Faithfulness: `{ragas.get('faithfulness',\
          \ 'n/a'):.3f}` (target \u2265 0.90)\\n\"\n        f\"Hallucination: `{ragas.get('hallucination_rate',\
          \ 'n/a'):.3f}` (target \u2264 0.10)\\n\"\n        f\"Answer Relevancy: `{ragas.get('answer_relevancy',\
          \ 'n/a'):.3f}`\\n\"\n        f\"Samples: {ragas.get('sample_count', 'n/a')}\
          \ | \"\n        f\"Eval time: {ragas.get('eval_seconds', 'n/a')}s\\n\"\n\
          \        f\"MLflow run: `{ragas.get('mlflow_run_id', 'n/a')}`\"\n    )\n\
          \n    if slack_webhook_url and slack_webhook_url.startswith(\"https://\"\
          ):\n        try:\n            requests.post(slack_webhook_url, json={\"\
          text\": text}, timeout=10)\n        except Exception as e:\n           \
          \ print(f\"Slack notification failed: {e}\")\n\n    print(text)\n\n"
        image: python:3.11-slim
    exec-promote-to-staging-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - promote_to_staging_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.2.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'mlflow==2.12.0'\
          \ 'boto3==1.34.0' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef promote_to_staging_component(\n    mlflow_tracking_uri: str,\n\
          \    model_name: str,\n    version: str,\n    ragas_gate_passed: bool,\n\
          \    ragas_report: Input[Artifact],\n    # Outputs\n    promotion_result:\
          \ Output[Artifact],\n) -> bool:\n    \"\"\"\n    Promote a registered model\
          \ version to the Staging stage IF the RAGAS\n    gate passed.  Writes a\
          \ promotion_result artifact recording the decision.\n\n    Returns True\
          \ if promoted, False if blocked.\n    \"\"\"\n    import json\n    import\
          \ mlflow\n    from mlflow.tracking import MlflowClient\n\n    with open(ragas_report.path)\
          \ as f:\n        ragas_data = json.load(f)\n\n    if not ragas_gate_passed:\n\
          \        result = {\n            \"promoted\":      False,\n           \
          \ \"reason\":        \"RAGAS gate failed\",\n            \"gate_failures\"\
          : ragas_data.get(\"gate_failures\", []),\n        }\n        with open(promotion_result.path,\
          \ \"w\") as f:\n            json.dump(result, f, indent=2)\n        print(f\"\
          BLOCKED: RAGAS gate failed \u2014 {ragas_data.get('gate_failures')}\")\n\
          \        return False\n\n    mlflow.set_tracking_uri(mlflow_tracking_uri)\n\
          \    client = MlflowClient()\n\n    # Archive any existing Staging version\
          \ before promoting\n    existing_staging = client.get_latest_versions(model_name,\
          \ stages=[\"Staging\"])\n    for old_mv in existing_staging:\n        client.transition_model_version_stage(\n\
          \            name=model_name,\n            version=old_mv.version,\n   \
          \         stage=\"Archived\",\n        )\n        print(f\"Archived old\
          \ staging version: {old_mv.version}\")\n\n    # Promote new version\n  \
          \  client.transition_model_version_stage(\n        name=model_name,\n  \
          \      version=version,\n        stage=\"Staging\",\n        archive_existing_versions=True,\n\
          \    )\n\n    client.update_model_version(\n        name=model_name,\n \
          \       version=version,\n        description=(\n            f\"Promoted\
          \ to Staging by P09. \"\n            f\"RAGAS faithfulness={ragas_data.get('faithfulness',\
          \ 'n/a'):.3f}, \"\n            f\"hallucination_rate={ragas_data.get('hallucination_rate',\
          \ 'n/a'):.3f}\"\n        ),\n    )\n\n    result = {\n        \"promoted\"\
          :            True,\n        \"model_name\":          model_name,\n     \
          \   \"version\":             version,\n        \"stage\":              \
          \ \"Staging\",\n        \"ragas_faithfulness\":  ragas_data.get(\"faithfulness\"\
          ),\n        \"ragas_hallucination\": ragas_data.get(\"hallucination_rate\"\
          ),\n        \"mlflow_run_id\":       ragas_data.get(\"mlflow_run_id\"),\n\
          \    }\n    with open(promotion_result.path, \"w\") as f:\n        json.dump(result,\
          \ f, indent=2)\n\n    print(f\"PROMOTED: {model_name} v{version} \u2192\
          \ Staging\")\n    return True\n\n"
