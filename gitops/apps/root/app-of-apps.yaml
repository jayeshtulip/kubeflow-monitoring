# ArgoCD App-of-Apps — manages all child applications
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llm-platform-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/llm-platform.git
    targetRevision: HEAD
    path: gitops/apps/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
