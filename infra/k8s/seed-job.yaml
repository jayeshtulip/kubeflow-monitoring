apiVersion: batch/v1
kind: Job
metadata:
  name: seed-golden-qa
  namespace: llm-platform-prod
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: seeder
          image: python:3.11-slim
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install psycopg2-binary pyyaml -q &&
              python -c "
              import psycopg2, json, os
              conn = psycopg2.connect(
                host=os.environ['POSTGRES_HOST'],
                dbname='llm_platform',
                user='llm_admin',
                password=os.environ['POSTGRES_PASSWORD'],
                port=5432
              )
              cur = conn.cursor()
              cur.execute('''CREATE TABLE IF NOT EXISTS golden_qa (
                id SERIAL PRIMARY KEY,
                question TEXT NOT NULL,
                ground_truth TEXT NOT NULL,
                domain VARCHAR(50),
                category VARCHAR(100),
                source_doc_id VARCHAR(200),
                active BOOLEAN DEFAULT TRUE,
                created_at TIMESTAMP DEFAULT NOW()
              )''')
              conn.commit()
              print('Schema created')
              conn.close()
              print('Done')
              "
          env:
            - name: POSTGRES_HOST
              value: "llm-platform-prod-postgres.c2xig0uywkrb.us-east-1.rds.amazonaws.com"
            - name: POSTGRES_PASSWORD
              value: "Llmplatform2026"

