apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gateway
  namespace: llm-platform-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-gateway
  template:
    metadata:
      labels:
        app: llm-gateway
    spec:
      containers:
        - name: llm-gateway
          image: python:3.11-slim
          ports:
            - containerPort: 8000
          env:
            - name: OLLAMA_BASE_URL
              value: "http://ollama-service:11434"
          command: ["python3", "-c"]
          args:
            - |
              import http.server, json, urllib.request, os
              class Handler(http.server.BaseHTTPRequestHandler):
                def do_GET(self):
                  if self.path == '/health':
                    self.send_response(200)
                    self.end_headers()
                    self.wfile.write(b'{"status":"ok","service":"llm-gateway"}')
                def do_POST(self):
                  if self.path == '/api/query':
                    length = int(self.headers['Content-Length'])
                    body = json.loads(self.rfile.read(length))
                    payload = json.dumps({"model":"mistral:7b","prompt":body.get("query",""),"stream":False}).encode()
                    req = urllib.request.Request(os.environ['OLLAMA_BASE_URL']+'/api/generate',data=payload,headers={'Content-Type':'application/json'})
                    resp = urllib.request.urlopen(req,timeout=120)
                    result = json.loads(resp.read())
                    self.send_response(200)
                    self.send_header('Content-Type','application/json')
                    self.end_headers()
                    self.wfile.write(json.dumps({"response":result.get("response",""),"model":"mistral:7b"}).encode())
                def log_message(self, *args): pass
              http.server.HTTPServer(('0.0.0.0',8000),Handler).serve_forever()
---
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway
  namespace: llm-platform-prod
spec:
  selector:
    app: llm-gateway
  ports:
    - port: 8000
      targetPort: 8000
