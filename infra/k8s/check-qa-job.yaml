apiVersion: batch/v1
kind: Job
metadata:
  name: check-qa
  namespace: llm-platform-prod
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: checker
          image: python:3.11-slim
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install psycopg2-binary -q &&
              python -c "
              import psycopg2, os
              conn = psycopg2.connect(
                host=os.environ['POSTGRES_HOST'],
                dbname='llm_platform', user='llm_admin',
                password=os.environ['POSTGRES_PASSWORD'],
                port=5432, sslmode='require'
              )
              cur = conn.cursor()
              print('=== Coverage by domain ===')
              cur.execute('SELECT domain, COUNT(*) FROM golden_qa GROUP BY domain ORDER BY domain')
              for row in cur.fetchall(): print(f'  {row[0]:6}: {row[1]} pairs')
              print()
              print('=== Sample questions (first 3 per domain) ===')
              for domain in ['tech', 'hr', 'org']:
                cur.execute('SELECT question FROM golden_qa WHERE domain=%s LIMIT 3', (domain,))
                print(f'  {domain.upper()}:')
                for row in cur.fetchall(): print(f'    - {row[0][:70]}')
              print()
              print('=== Tables in database ===')
              cur.execute(\"\"\"SELECT tablename FROM pg_tables WHERE schemaname='public'\"\"\")
              for row in cur.fetchall(): print(f'  {row[0]}')
              conn.close()
              "
          env:
            - name: POSTGRES_HOST
              value: "llm-platform-prod-postgres.c2xig0uywkrb.us-east-1.rds.amazonaws.com"
            - name: POSTGRES_PASSWORD
              value: "Llmplatform2026"
