apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: llm-platform-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
            limits:
              cpu: "4"
              memory: "12Gi"
          lifecycle:
            postStart:
              exec:
                command: ["/bin/sh", "-c", "sleep 10 && ollama pull mistral:7b &"]
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: llm-platform-prod
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
