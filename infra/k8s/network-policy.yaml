# Deny all ingress by default, then explicitly allow
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: llm-platform-prod
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Allow API gateway to receive external traffic from ALB
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-ingress
  namespace: llm-platform-prod
spec:
  podSelector:
    matchLabels:
      app: llm-platform-api
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8000
---
# Allow inter-pod communication within namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: llm-platform-prod
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: llm-platform-prod
---
# Allow monitoring namespace to scrape Prometheus metrics
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: llm-platform-prod
spec:
  podSelector:
    matchLabels:
      prometheus.io/scrape: "true"
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
