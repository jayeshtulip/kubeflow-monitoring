apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-lease-role
  namespace: kubeflow
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update", "patch", "delete", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-lease-binding
  namespace: kubeflow
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-lease-role
subjects:
  - kind: ServiceAccount
    name: argo
    namespace: kubeflow
