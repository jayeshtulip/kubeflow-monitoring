apiVersion: v1
kind: Service
metadata:
  name: mlflow-service
  namespace: kubeflow
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: v1
kind: Endpoints
metadata:
  name: mlflow-service
  namespace: kubeflow
subsets:
  - addresses:
      - ip: 10.0.2.80
    ports:
      - port: 80
