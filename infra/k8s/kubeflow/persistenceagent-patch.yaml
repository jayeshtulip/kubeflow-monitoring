spec:
  template:
    spec:
      containers:
        - name: agent
          env:
            - name: NAMESPACE
              value: kubeflow
            - name: DBCONFIG_MYSQLCONFIG_USER
              value: root
            - name: DBCONFIG_MYSQLCONFIG_PASSWORD
              value: ""
            - name: DBCONFIG_MYSQLCONFIG_DBNAME
              value: mlpipeline
            - name: DBCONFIG_MYSQLCONFIG_HOST
              value: mysql
            - name: DBCONFIG_MYSQLCONFIG_PORT
              value: "3306"
            - name: TTL_SECONDS_AFTER_WORKFLOW_FINISH
              value: "86400"
            - name: NUM_WORKERS
              value: "2"
            - name: WORKFLOW_INFORMER_RESYNC_PERIOD
              value: "30"
