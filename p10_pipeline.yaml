        parameterType: STRING
      postgres_password:
        defaultValue: Llmplatform2026
        isOptional: true
        parameterType: STRING
      postgres_user:
        defaultValue: llm_admin
        isOptional: true
        parameterType: STRING
      qdrant_host:
        defaultValue: qdrant.llm-platform-prod.svc.cluster.local
        isOptional: true
        parameterType: STRING
      s3_remote:
        defaultValue: s3://llm-platform-dvc-remote-659071697671/dvc
        isOptional: true
        parameterType: STRING
      stage:
