  dag:
    tasks:
      dvc-pull-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-dvc-pull-component
        inputs:
          parameters:
            aws_region:
              componentInputParameter: aws_region
            s3_remote:
              componentInputParameter: s3_remote
        taskInfo:
          name: dvc-pull-component
      dvc-push-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-dvc-push-component
