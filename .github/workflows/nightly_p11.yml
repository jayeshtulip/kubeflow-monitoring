name: Nightly P11 Auto-Retraining

on:
  schedule:
    - cron: "30 3 * * 1-5"
  workflow_dispatch:
    inputs:
      force_retrain:
        description: "Force retraining even if no drift detected"
        default: "false"
        type: choice
        options: ["true", "false"]
      trigger_reason:
        description: "Trigger reason"
        default: "scheduled"
        type: choice
        options: ["scheduled", "p09_gate_fail", "manual"]

permissions:
  id-token: write
  contents: read

jobs:
  p11-auto-retrain:
    name: P11 Drift Detection and Auto-Retraining
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install kfp==2.2.0 requests --quiet

      - name: Configure kubectl
        run: aws eks update-kubeconfig --region us-east-1 --name llm-platform-prod

      - name: Start port-forwards
        run: |
          kubectl port-forward svc/ml-pipeline 8080:8888 -n kubeflow &
          kubectl port-forward svc/mlflow-service 5000:5000 -n mlflow &
          sleep 10
          curl -sf http://localhost:8080/apis/v2beta1/healthz || (echo "KFP not ready" && exit 1)

      - name: Compile P11
        run: python scripts/compile_p11.py

      - name: Submit P11
        env:
          KFP_ENDPOINT: "http://localhost:8080"
        run: |
          ARGS=""
          [ "${{ github.event.inputs.force_retrain }}" == "true" ] && ARGS="--force-retrain"
          TRIGGER="${{ github.event.inputs.trigger_reason || 'scheduled' }}"
          python scripts/submit_p11.py $ARGS --trigger $TRIGGER

      - name: Wait for completion
        run: |
          echo "Polling for P11 completion (max 90 min)..."
          for i in $(seq 1 90); do
            STATUS=$(kubectl get workflow -n kubeflow \
              --sort-by=.metadata.creationTimestamp \
              -o jsonpath='{.items[-1:].status.phase}' 2>/dev/null || echo "Unknown")
            echo "[${i}m] P11 status: $STATUS"
            [ "$STATUS" == "Succeeded" ] && echo "P11 Succeeded" && break
            [ "$STATUS" == "Failed" ] && echo "P11 Failed" && exit 1
            sleep 60
          done

      - name: Verify Qdrant post-retraining
        run: |
          kubectl port-forward svc/qdrant 6333:6333 -n llm-platform-prod &
          sleep 5
          pip install qdrant-client --quiet
          python -c "
          from qdrant_client import QdrantClient
          c = QdrantClient(host='localhost', port=6333)
          print('Post-P11 Qdrant state:')
          for col in ['tech_docs', 'hr_policies', 'org_info']:
              print(f'  {col}: {c.get_collection(col).points_count} points')
          "

      - name: Write job summary
        if: always()
        run: |
          echo "### P11 Auto-Retraining" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: ${{ github.event.inputs.trigger_reason || 'scheduled' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Force retrain: ${{ github.event.inputs.force_retrain || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Check MLflow experiment **p11-auto-retraining** for delta scores" >> $GITHUB_STEP_SUMMARY
