name: Nightly - P09 RAGAS + P04 Health + Platform Checks

on:
  schedule:
    - cron: "0 3 * * 1-5"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  platform-health:
    name: Platform Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name llm-platform-prod --region us-east-1

      - name: Check all pods healthy
        run: |
          echo "=== Checking all namespaces ==="
          kubectl get pods -n kubeflow | grep -v "Running\|Completed" | grep -v "NAME" && echo "WARNING: unhealthy pods in kubeflow" || echo "kubeflow OK"
          kubectl get pods -n llm-platform-prod | grep -v "Running\|Completed" | grep -v "NAME" && echo "WARNING: unhealthy pods in llm-platform-prod" || echo "llm-platform-prod OK"
          kubectl get pods -n monitoring | grep -v "Running\|Completed" | grep -v "NAME" && echo "WARNING: unhealthy pods in monitoring" || echo "monitoring OK"
          kubectl get pods -n mlflow | grep -v "Running\|Completed" | grep -v "NAME" && echo "WARNING: unhealthy pods in mlflow" || echo "mlflow OK"
          kubectl get pods -n argocd | grep -v "Running\|Completed" | grep -v "NAME" && echo "WARNING: unhealthy pods in argocd" || echo "argocd OK"

      - name: Check ArgoCD sync status
        run: |
          kubectl get applications.argoproj.io -n argocd
          UNSYNCED=$(kubectl get applications.argoproj.io -n argocd -o jsonpath='{.items[?(@.status.sync.status!="Synced")].metadata.name}')
          if [ -n "$UNSYNCED" ]; then echo "WARNING: OutOfSync apps: $UNSYNCED"; else echo "ArgoCD: all apps synced"; fi

      - name: Check Prometheus metrics
        run: |
          kubectl port-forward svc/kube-prometheus-kube-prome-prometheus 9090:9090 -n monitoring &
          sleep 10
          REDIS_UP=$(curl -s "http://localhost:9090/api/v1/query?query=redis_up" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['result'][0]['value'][1])" 2>/dev/null || echo "unknown")
          PG_UP=$(curl -s "http://localhost:9090/api/v1/query?query=max(pg_up)" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['result'][0]['value'][1])" 2>/dev/null || echo "unknown")
          echo "Redis UP: $REDIS_UP"
          echo "PostgreSQL UP: $PG_UP"

  unit-tests:
    name: L1 Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pytest kfp==2.2.0 mlflow==2.12.2 --quiet

      - name: Run unit tests
        run: pytest tests/unit/ -v --timeout=120 || echo "No unit tests yet - add tests to tests/unit/"

      - name: Run component tests
        run: pytest tests/component/ -v --timeout=300 || echo "No component tests yet - add tests to tests/component/"

  submit-p04:
    name: Submit P04 Quality Monitoring
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: platform-health
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests --quiet

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name llm-platform-prod --region us-east-1

      - name: Port-forward KFP API
        run: |
          kubectl port-forward svc/ml-pipeline 8080:8888 -n kubeflow &
          sleep 10

      - name: Submit P04 Quality Monitoring pipeline
        run: |
          python3 -c "
          import requests, json
          base = 'http://localhost:8080'
          payload = {
              'name': 'nightly-p04-quality',
              'pipeline_spec': {'pipeline_id': 'e80f6090-254b-4f05-b0cb-4855de1bf3cc'},
              'resource_references': [{'key': {'type': 'EXPERIMENT',
                  'id': '21487485-55f3-4529-8c66-90f5710c8e4e'}, 'relationship': 'OWNER'}]
          }
          r = requests.post(f'{base}/apis/v1beta1/runs', json=payload, timeout=10)
          print('P04 submitted:', r.status_code)
          run_id = r.json().get('run', {}).get('id', '')
          print('Run ID:', run_id)
          "
