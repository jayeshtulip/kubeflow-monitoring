name: Release - Production Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (commit SHA)"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name llm-platform-prod --region us-east-1

      - name: Deploy llm-gateway
        run: |
          kubectl set image deployment/llm-gateway \
            llm-gateway=659071697671.dkr.ecr.us-east-1.amazonaws.com/llm-platform/api:${{ github.event.inputs.image_tag }} \
            -n llm-platform-prod
          kubectl rollout status deployment/llm-gateway -n llm-platform-prod --timeout=120s

      - name: Verify deployment
        run: kubectl get pods -n llm-platform-prod -l app=llm-gateway
