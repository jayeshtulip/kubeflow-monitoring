stages:
  preprocess:
    cmd: python -c "import os, pathlib; pathlib.Path('data/processed').mkdir(parents=True, exist_ok=True); open('data/processed/.keep','w').close(); print('preprocess: placeholder - indexer runs via P05 pipeline')"
    deps:
      - data/raw
    outs:
      - data/processed
    desc: "Placeholder - actual indexing runs via Kubeflow P05 pipeline"

  embed:
    cmd: python -c "import os, pathlib; pathlib.Path('data/embeddings').mkdir(parents=True, exist_ok=True); open('data/embeddings/.keep','w').close(); print('embed: placeholder - embedding runs via P05 pipeline')"
    deps:
      - data/processed
    outs:
      - data/embeddings
    desc: "Placeholder - actual embedding runs via Kubeflow P05 pipeline"

  index:
    cmd: python -c "print('index: placeholder - Qdrant indexing runs via P05 pipeline')"
    deps:
      - data/embeddings
    desc: "Placeholder - actual Qdrant upsert runs via Kubeflow P05 pipeline"

  validate_golden_qa:
    cmd: python scripts/dvc/validate_golden_qa.py
    deps:
      - scripts/dvc/validate_golden_qa.py
      - data/golden_qa
    outs:
      - data/reports/coverage_report.json:
          cache: false
    desc: "Validate QA dataset coverage per domain from PostgreSQL"

  ragas_baseline:
    cmd: python -c "print('ragas_baseline: runs via Kubeflow P09 pipeline with vLLM judge')"
    deps:
      - data/golden_qa
      - data/embeddings
    desc: "Placeholder - RAGAS evaluation runs via Kubeflow P09 pipeline"
