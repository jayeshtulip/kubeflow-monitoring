stages:
  preprocess:
    cmd: python scripts/dvc/run_indexer.py --mode preprocess --input-dir data/raw --output-dir data/processed --chunk-size 50 --overlap 10
    deps:
      - scripts/dvc/run_indexer.py
      - src/storage/qdrant/indexer.py
      - data/raw
    outs:
      - data/processed
    desc: "Chunk raw documents into overlapping segments"

  embed:
    cmd: python scripts/dvc/run_indexer.py --mode embed --input-dir data/processed --output-dir data/embeddings --model all-MiniLM-L6-v2
    deps:
      - scripts/dvc/run_indexer.py
      - src/storage/qdrant/indexer.py
      - data/processed
    outs:
      - data/embeddings
    desc: "Generate sentence-transformer embeddings for all chunks"

  index:
    cmd: python scripts/dvc/run_indexer.py --mode index --input-dir data/embeddings --qdrant-host qdrant.llm-platform-prod.svc.cluster.local
    deps:
      - scripts/dvc/run_indexer.py
      - src/storage/qdrant/indexer.py
      - data/embeddings
    desc: "Upsert embeddings into Qdrant collections"

  validate_golden_qa:
    cmd: python scripts/dvc/validate_golden_qa.py
    deps:
      - scripts/dvc/validate_golden_qa.py
      - data/golden_qa
    outs:
      - data/reports/coverage_report.json:
          cache: false
    desc: "Validate QA dataset coverage per domain from PostgreSQL"

  ragas_baseline:
    cmd: python scripts/dvc/ragas_baseline_placeholder.py
    deps:
      - scripts/dvc/ragas_baseline_placeholder.py
      - data/golden_qa
      - data/embeddings
    desc: "Placeholder - RAGAS evaluation runs via Kubeflow P09 pipeline"
