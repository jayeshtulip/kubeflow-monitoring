stages:
  preprocess:
    cmd: pip install -q "protobuf==4.25.3" && python scripts/dvc/run_indexer.py --mode preprocess --input-dir data/raw --output-dir data/processed --chunk-size 50 --overlap 10
    deps:
      - scripts/dvc/run_indexer.py
      - src/storage/qdrant/indexer.py
      - data/raw
    outs:
      - data/processed
  embed:
    cmd: pip install -q "protobuf==4.25.3" && python scripts/dvc/run_indexer.py --mode embed --input-dir data/processed --output-dir data/embeddings --model all-MiniLM-L6-v2
    deps:
      - scripts/dvc/run_indexer.py
      - src/storage/qdrant/indexer.py
      - data/processed
    outs:
      - data/embeddings
  index:
    cmd: pip install -q "protobuf==4.25.3" && python scripts/dvc/run_indexer.py --mode index --input-dir data/embeddings --qdrant-host qdrant.llm-platform-prod.svc.cluster.local
    deps:
      - scripts/dvc/run_indexer.py
      - src/storage/qdrant/indexer.py
      - data/embeddings
  validate_golden_qa:
    cmd: pip install -q "protobuf==4.25.3" && python scripts/dvc/validate_golden_qa.py
    deps:
      - scripts/dvc/validate_golden_qa.py
      - data/golden_qa
    outs:
      - data/reports/coverage_report.json:
          cache: false
  ragas_baseline:
    cmd: python scripts/dvc/ragas_baseline_placeholder.py
    deps:
      - scripts/dvc/ragas_baseline_placeholder.py
      - data/golden_qa
      - data/embeddings
