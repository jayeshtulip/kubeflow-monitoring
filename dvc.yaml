# DVC Pipeline — Enterprise LLM Platform
# Reproducible stages: preprocess -> embed -> index
# Run: dvc repro
# Params live in: mlops/dvc/params/rag_params.yaml

stages:

  preprocess:
    cmd: >
      python -m src.storage.qdrant.indexer
        --mode preprocess
        --input-dir data/raw
        --output-dir data/processed
        --params mlops/dvc/params/rag_params.yaml
    deps:
      - src/storage/qdrant/indexer.py
      - data/raw
      - mlops/dvc/params/rag_params.yaml
    outs:
      - data/processed
    metrics:
      - data/processed/preprocess_metrics.json:
          cache: false
    desc: "Chunk raw documents into fixed-size overlapping segments"

  embed:
    cmd: >
      python -m src.storage.qdrant.indexer
        --mode embed
        --input-dir data/processed
        --output-dir data/embeddings
        --params mlops/dvc/params/rag_params.yaml
    deps:
      - src/storage/qdrant/indexer.py
      - data/processed
      - mlops/dvc/params/rag_params.yaml
    outs:
      - data/embeddings
    metrics:
      - data/embeddings/embed_metrics.json:
          cache: false
    desc: "Generate sentence-transformer embeddings for all chunks"

  index:
    cmd: >
      python -m src.storage.qdrant.indexer
        --mode index
        --input-dir data/embeddings
        --params mlops/dvc/params/rag_params.yaml
    deps:
      - src/storage/qdrant/indexer.py
      - data/embeddings
      - mlops/dvc/params/rag_params.yaml
    metrics:
      - data/embeddings/index_metrics.json:
          cache: false
    desc: "Upsert embeddings into Qdrant vector collections"

  validate_golden_qa:
    cmd: >
      python -m src.ragas_eval.dataset_builder
        --mode validate
        --data-dir data/golden_qa
        --output data/golden_qa/coverage_report.json
    deps:
      - src/ragas_eval/dataset_builder.py
      - data/golden_qa
    outs:
      - data/golden_qa/coverage_report.json:
          cache: false
    desc: "Validate golden QA dataset coverage per domain"

  ragas_baseline:
    cmd: >
      python -m src.ragas_eval.evaluator
        --mode baseline
        --golden-qa-dir data/golden_qa
        --output data/ragas_results/baseline.json
        --params mlops/dvc/params/rag_params.yaml
    deps:
      - src/ragas_eval/evaluator.py
      - data/golden_qa
      - data/embeddings
      - mlops/dvc/params/rag_params.yaml
    outs:
      - data/ragas_results/baseline.json:
          cache: false
    metrics:
      - data/ragas_results/baseline.json:
          cache: false
    desc: "Run RAGAS baseline evaluation against golden QA dataset"
