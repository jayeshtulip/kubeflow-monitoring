[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    l1: L1 Infrastructure tests (require AWS credentials)
    l2: L2 Component tests (require live services)
    l3: L3 Integration tests (require full platform running)
    l4: L4 Performance tests (require H100 vLLM server)
    aws: Tests requiring live AWS resources (subset of l1)
    live: Tests requiring live service endpoints (subset of l2)
    slow: Tests taking more than 30 seconds

log_cli = true
log_cli_level = INFO
log_format = %(asctime)s %(levelname)s %(name)s: %(message)s
log_date_format = %Y-%m-%d %H:%M:%S

asyncio_mode = auto
timeout = 30
