# PIPELINE DEFINITION
# Name: p01-model-evaluation
# Description: Test all 4 LangGraph workflows. 5 queries x 4 = 20 test cases.
# Inputs:
#    api_base_url: str [Default: 'http://llm-gateway.llm-platform-prod.svc.cluster.local:8000']
#    mlflow_tracking_uri: str [Default: 'http://172.20.232.117:80']
#    test_queries_json: str [Default: '["Why is the payment service timing out?", "What is the leave policy?", "How do I restart a pod?", "What are the RDS connection limits?"]']
#    timeout_seconds: int [Default: 90.0]
# Outputs:
#    run-workflow-tests-component-2-test_metrics: system.Metrics
#    run-workflow-tests-component-3-test_metrics: system.Metrics
#    run-workflow-tests-component-4-test_metrics: system.Metrics
#    run-workflow-tests-component-test_metrics: system.Metrics
