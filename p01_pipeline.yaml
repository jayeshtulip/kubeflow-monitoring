pipelineInfo:
  description: Test all 4 LangGraph workflows. 5 queries x 4 = 20 test cases.
  name: p01-model-evaluation
root:
  dag:
    outputs:
      artifacts:
        run-workflow-tests-component-2-test_metrics:
          artifactSelectors:
          - outputArtifactKey: test_metrics
            producerSubtask: run-workflow-tests-component-2
        run-workflow-tests-component-3-test_metrics:
          artifactSelectors:
          - outputArtifactKey: test_metrics
            producerSubtask: run-workflow-tests-component-3
        run-workflow-tests-component-4-test_metrics:
          artifactSelectors:
          - outputArtifactKey: test_metrics
            producerSubtask: run-workflow-tests-component-4
        run-workflow-tests-component-test_metrics:
          artifactSelectors:
          - outputArtifactKey: test_metrics
            producerSubtask: run-workflow-tests-component
    tasks:
      compare-workflows-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-compare-workflows-component
        dependentTasks:
        - run-workflow-tests-component
        - run-workflow-tests-component-2
        - run-workflow-tests-component-3
        - run-workflow-tests-component-4
        inputs:
